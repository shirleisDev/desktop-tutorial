<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Games | Loja Oficial</title>

<style>
        :root {
            --azul-galatico: #00d4ff;
            --vermelho-neon: #ff004c;
            --laranja-fogo: #ff8c00;
            --fundo-espacial: #050505;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, var(--fundo-espacial) 100%);
            color: white;
            margin: 0;
            padding: 20px;
        }

        /* Título Estilo Gamer */
        .titulo-gamer {
            text-align: center;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--vermelho-neon), var(--azul-galatico));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
        }

        /* 1. Container Carrossel (7 Imagens) */
        .carrossel-container {
            width: 100%;
            max-width: 1000px;
            height: 350px;
            margin: 0 auto 50px;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            border: 3px solid var(--azul-galatico);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .carrossel-item {
            flex: 0 0 100%; /* Cada imagem ocupa 100% do carrossel */
            scroll-snap-align: start;
            height: 100%;
        }

        .carrossel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Preenche 100% sem vazar */
            display: block;
        }

        /* 2. Container de 4 Cards Estáticos */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background: #111;
            border-radius: 15px;
            overflow: hidden; /* Corta a imagem no 100% */
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--laranja-fogo);
            box-shadow: 0 0 20px var(--laranja-fogo);
        }

        /* Imagem do Card Ocupando 100% da Tag/Container */
        .card-img-wrapper {
            width: 100%;
            height: 160px; /* Altura fixa para manter o padrão */
            overflow: hidden;
        }


/* Atualização do efeito de hover nos cards */
.card:hover {
    transform: translateY(-10px);
    border-color: var(--azul-galatico); /* Mudamos para azul ao passar o mouse */
    
    /* Aplica a animação de "piscar" */
    animation: glow-azul 1.5s infinite alternate;
}

/* Definição da animação de pulsação (piscar) */
@keyframes glow-azul {
    from {
        box-shadow: 0 0 10px var(--azul-galatico), 
                    0 0 20px rgba(0, 212, 255, 0.2);
    }
    to {
        box-shadow: 0 0 25px var(--azul-galatico), 
                    0 0 45px rgba(0, 212, 255, 0.6);
    }
}   

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 15px;
            text-align: center;
        }

        .card-info h3 { margin: 10px 0; font-size: 1.1rem; color: var(--azul-galatico); }

        .btn-venda {
            background: var(--laranja-fogo);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Esconder barra de rolagem mas manter funcionalidade */
        .carrossel-container::-webkit-scrollbar { display: none; }
    </style>
</head>
